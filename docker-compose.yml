services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python -m app.initdb &&
             python -m app.seed &&
             gunicorn app.main:app -k uvicorn.workers.UvicornWorker
             -w $${WEB_CONCURRENCY:-4} -b 0.0.0.0:8000 --timeout 60
             --access-logfile - --error-logfile -"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build: ./backend
    command: python -m app.bot.run
    env_file: ./backend/.env
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./backend:/app

  tma:
    build:
      context: ./tma
    env_file: ./tma/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
    env_file: ./admin/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  courier:
    build:
      context: ./courier
    env_file: ./courier/.env
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres-data:
