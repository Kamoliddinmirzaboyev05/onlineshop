# Loyiha nomi qat'iy belgilangan — aks holda docker compose uni papka nomidan
# oladi va bu fayl asosiy docker-compose.yml stack'ini ("allfoods") to'xtatib
# yuboradi. `-p` bayrog'iga tayanmaymiz: uni unutish oson.
name: allfoods-test

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data-local-test:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python -m app.initdb &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres-data-local-test:
