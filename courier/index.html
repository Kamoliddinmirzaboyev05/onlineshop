<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF5722" />
    <title>All Foods — Kuryer</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS: Home Screen'ga o'rnatib, standalone rejimda ochish uchun shart.
         Ushbu meta teglarsiz iOS Push API'ni umuman taqdim etmaydi. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AF Kuryer" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      /* Instant splash — paints before any JS so there is no white flash.
         The React <Splash> overlays the same gradient, so the hand-off is seamless. */
      html,
      body {
        margin: 0;
        background: linear-gradient(to bottom, #ff7043, #ff5722);
      }
      #af-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom, #ff7043, #ff5722);
        z-index: 60;
      }
      #af-boot .logo {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
        animation: af-boot-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes af-boot-pop {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="af-boot">
        <div class="logo">
          <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#FF5722" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18.5" cy="17.5" r="3.5" />
            <circle cx="5.5" cy="17.5" r="3.5" />
            <circle cx="15" cy="5" r="1" />
            <path d="M12 17.5V14l-3-3 4-3 2 3h2" />
          </svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
